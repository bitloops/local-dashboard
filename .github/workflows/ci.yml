name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Lint And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format checker
        run: pnpm run format:check

      - name: Run linter
        run: pnpm run lint

      - name: Run unit and integration tests
        run: pnpm run test

      - name: Run e2e tests
        run: pnpm run test:e2e

      - name: Build
        run: pnpm run build
